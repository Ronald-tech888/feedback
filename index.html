<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DIY Plumbing Feedback | 水管维修反馈表</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b3b5f, #1b7f8a);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 100%;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .lang-switch {
            text-align: right;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .lang-btn.active {
            background: #ff6b35;
            border-color: #ff6b35;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: white;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: -0.3px;
        }

        h1 i {
            margin-right: 8px;
            font-size: 1.5rem;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.8rem;
            margin-bottom: 24px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: white;
            font-size: 0.85rem;
        }

        label i {
            margin-right: 6px;
            width: 20px;
            color: #ffd166;
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 210, 90, 0.4);
        }

        .rating-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .rating-container {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 6px;
        }

        .rating-container input {
            display: none;
        }

        .rating-container label {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.15s;
            margin: 0;
            line-height: 1;
        }

        .rating-container label:hover,
        .rating-container label:hover ~ label,
        .rating-container input:checked ~ label {
            color: #ffb703;
            text-shadow: 0 0 4px #ffb703;
        }

        .rating-text {
            font-size: 0.75rem;
            color: white;
            background: rgba(0, 0, 0, 0.35);
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.97);
            background: #ff5a22;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            color: rgba(255, 255, 240, 0.6);
        }

        .required-star {
            color: #ffb347;
            margin-left: 3px;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            h1 {
                font-size: 1.4rem;
            }
            h1 i {
                font-size: 1.3rem;
            }
            .rating-container label {
                font-size: 24px;
            }
            .rating-text {
                font-size: 0.7rem;
                white-space: normal;
            }
            .rating-wrapper {
                flex-wrap: wrap;
            }
            input, select, textarea {
                padding: 10px 12px;
                font-size: 0.85rem;
            }
            button {
                padding: 12px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="zh">中文</button>
    </div>

    <h1><i class="fas fa-wrench"></i> <span class="trans" data-en="DIY Plumbing Feedback" data-zh="DIY 水管维修反馈">DIY Plumbing Feedback</span></h1>
    <p class="subtitle"><i class="fas fa-comment-dots"></i> <span class="trans" data-en="Share your DIY experience, help us improve" data-zh="分享你的维修经验，帮我们做得更好">Share your DIY experience, help us improve</span></p>

    <form action="https://formsubmit.co/purchasingpoweruser@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="New DIY Plumbing Feedback">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_cc" value="midasmines@gmail.com,desmondsia.everlifestyle@gmail.com">
        <input type="text" name="_honey" style="display:none">

        <div class="form-group">
            <label><i class="fas fa-user"></i> <span class="trans" data-en="Your Name" data-zh="你的名字">Your Name</span> <span class="required-star">*</span></label>
            <input type="text" name="name" data-en-placeholder="e.g. John Doe" data-zh-placeholder="例如: 张三" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> <span class="trans" data-en="Email Address" data-zh="电子邮箱">Email Address</span></label>
            <input type="email" name="email" data-en-placeholder="your@email.com" data-zh-placeholder="your@email.com" placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label><i class="fas fa-tools"></i> <span class="trans" data-en="Project Type" data-zh="维修项目">Project Type</span> <span class="required-star">*</span></label>
            <select name="project_type" required id="projectSelect">
                <option value="" disabled selected data-en="-- Select a project --" data-zh="-- 请选择项目 --">-- Select a project --</option>
                <option value="Replacing a tap washer" data-en="🔧 Replacing a tap washer" data-zh="🔧 更换水龙头垫圈">🔧 Replacing a tap washer</option>
                <option value="Tightening pipe joints with PTFE tape" data-en="📐 Tightening pipe joints with PTFE tape" data-zh="📐 用生料带紧固管接头">📐 Tightening pipe joints with PTFE tape</option>
                <option value="Removing and cleaning a trap" data-en="🚰 Removing and cleaning a trap" data-zh="🚰 拆卸并清洁存水弯">🚰 Removing and cleaning a trap</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-star"></i> <span class="trans" data-en="Overall Rating" data-zh="整体评分">Overall Rating</span></label>
            <div class="rating-wrapper">
                <div class="rating-container">
                    <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                    <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                    <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                    <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                    <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                </div>
                <span class="rating-text" id="ratingLabel"><span class="trans" data-en="Click stars to rate" data-zh="点击星星评分">Click stars to rate</span></span>
            </div>
        </div>

        <!-- 反馈区域 - 已删除 "你的反馈" 大字标签 -->
        <div class="form-group">
            <textarea name="feedback" rows="4" data-en-placeholder="Describe your DIY experience, what worked, what didn't..." data-zh-placeholder="描述你的DIY经验，哪些有效，哪些无效..." placeholder="Describe your DIY experience, what worked, what didn't..." required></textarea>
        </div>

        <button type="submit"><i class="fas fa-paper-plane"></i> <span class="trans" data-en="Submit Feedback" data-zh="提交反馈">Submit Feedback</span></button>
    </form>

    <footer><i class="fas fa-shield-alt"></i> <span class="trans" data-en="Your opinion helps more DIY enthusiasts" data-zh="你的意见能帮助更多DIY爱好者">Your opinion helps more DIY enthusiasts</span></footer>
</div>

<script>
    const translations = {
        en: {
            nameLabel: 'Your Name', emailLabel: 'Email Address', projectLabel: 'Project Type',
            ratingLabel: 'Overall Rating', submit: 'Submit Feedback',
            footer: 'Your opinion helps more DIY enthusiasts', ratingDefault: 'Click stars to rate',
            phName: 'e.g. John Doe', phEmail: 'your@email.com', phFeedback: 'Describe your DIY experience, what worked, what didn\'t...',
            selectDefault: '-- Select a project --', opt1: '🔧 Replacing a tap washer', opt2: '📐 Tightening pipe joints with PTFE tape', opt3: '🚰 Removing and cleaning a trap'
        },
        zh: {
            nameLabel: '你的名字', emailLabel: '电子邮箱', projectLabel: '维修项目',
            ratingLabel: '整体评分', submit: '提交反馈',
            footer: '你的意见能帮助更多DIY爱好者', ratingDefault: '点击星星评分',
            phName: '例如: 张三', phEmail: 'your@email.com', phFeedback: '描述你的DIY经验，哪些有效，哪些无效...',
            selectDefault: '-- 请选择项目 --', opt1: '🔧 更换水龙头垫圈', opt2: '📐 用生料带紧固管接头', opt3: '🚰 拆卸并清洁存水弯'
        }
    };

    const ratingTexts = {
        en: {1:'⭐ Very Poor',2:'⭐⭐ Not good',3:'⭐⭐⭐ Average',4:'⭐⭐⭐⭐ Pretty good',5:'⭐⭐⭐⭐⭐ Excellent!', default:'Click stars to rate'},
        zh: {1:'⭐ 很差',2:'⭐⭐ 不太好',3:'⭐⭐⭐ 一般般',4:'⭐⭐⭐⭐ 还不错',5:'⭐⭐⭐⭐⭐ 太棒了！', default:'点击星星评分'}
    };

    let currentLang = 'en';

    function updateRatingText() {
        const checked = document.querySelector('input[name="rating"]:checked');
        const ratingSpan = document.getElementById('ratingLabel');
        if (checked) {
            ratingSpan.innerHTML = ratingTexts[currentLang][parseInt(checked.value)];
        } else {
            ratingSpan.innerHTML = ratingTexts[currentLang].default;
        }
    }

    document.querySelectorAll('input[name="rating"]').forEach(radio => {
        radio.addEventListener('change', updateRatingText);
    });

    function switchLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];

        document.querySelectorAll('.trans').forEach(el => {
            if (lang === 'en' && el.getAttribute('data-en')) {
                el.textContent = el.getAttribute('data-en');
            } else if (lang === 'zh' && el.getAttribute('data-zh')) {
                el.textContent = el.getAttribute('data-zh');
            }
        });

        const labels = document.querySelectorAll('.form-group label');
        if (labels[0]) labels[0].innerHTML = `<i class="fas fa-user"></i> ${t.nameLabel} <span class="required-star">*</span>`;
        if (labels[1]) labels[1].innerHTML = `<i class="fas fa-envelope"></i> ${t.emailLabel}`;
        if (labels[2]) labels[2].innerHTML = `<i class="fas fa-tools"></i> ${t.projectLabel} <span class="required-star">*</span>`;
        if (labels[3]) labels[3].innerHTML = `<i class="fas fa-star"></i> ${t.ratingLabel}`;
        // 反馈区域没有 label，所以跳过 labels[4]

        const btn = document.querySelector('button');
        if (btn) btn.innerHTML = `<i class="fas fa-paper-plane"></i> ${t.submit}`;

        const footer = document.querySelector('footer');
        if (footer) footer.innerHTML = `<i class="fas fa-shield-alt"></i> ${t.footer}`;

        const nameInput = document.querySelector('input[name="name"]');
        const emailInput = document.querySelector('input[name="email"]');
        const feedbackTextarea = document.querySelector('textarea[name="feedback"]');
        if (nameInput) nameInput.placeholder = t.phName;
        if (emailInput) emailInput.placeholder = t.phEmail;
        if (feedbackTextarea) feedbackTextarea.placeholder = t.phFeedback;

        const select = document.querySelector('select[name="project_type"]');
        if (select) {
            const options = select.querySelectorAll('option');
            if (options[0]) { options[0].textContent = t.selectDefault; options[0].value = ''; }
            if (options[1]) options[1].textContent = t.opt1;
            if (options[2]) options[2].textContent = t.opt2;
            if (options[3]) options[3].textContent = t.opt3;
        }

        updateRatingText();

        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            switchLanguage(this.getAttribute('data-lang'));
        });
    });

    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        const name = document.querySelector('input[name="name"]').value.trim();
        const project = document.querySelector('select[name="project_type"]').value;
        const feedback = document.querySelector('textarea[name="feedback"]').value.trim();

        if (currentLang === 'en') {
            if (!name) { e.preventDefault(); alert('❌ Please enter your name'); return; }
            if (!project) { e.preventDefault(); alert('❌ Please select a project type'); return; }
            if (!feedback) { e.preventDefault(); alert('❌ Please enter your feedback'); return; }
        } else {
            if (!name) { e.preventDefault(); alert('❌ 请填写你的名字'); return; }
            if (!project) { e.preventDefault(); alert('❌ 请选择维修项目'); return; }
            if (!feedback) { e.preventDefault(); alert('❌ 请填写反馈内容'); return; }
        }
    });
</script>
</body>
</html>
